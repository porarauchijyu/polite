name: Scrape and Deploy RSS Dashboard

on:
  push:
    branches:
      - main
#  schedule:
#    - cron: '0 * * * *' # 1時間おきに実行
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package.json

      - name: Install dependencies
        run: |
          cd web
          npm install
          npx playwright install chromium --with-deps

      - name: Run Scraper
        run: |
          cd web
          npm run scrape

      - name: Commit Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. スクレイピング成果物を一時ディレクトリに退避
          mkdir -p ../temp_data
          cp web/public/data/articles.json ../temp_data/ || true
          cp web/public/data/targets.json ../temp_data/ || true
          cp web/public/feeds/*.xml ../temp_data/ || true
          
          # 2. リモートの最新状態を取得し、ローカルブランチをそこに強制一致させる
          git fetch origin main
          git checkout -B main origin/main
          
          # 3. 退避していた成果物を元の場所に戻す（これで最新の main の上に成果物が乗る）
          cp ../temp_data/articles.json web/public/data/ || true
          cp ../temp_data/targets.json web/public/data/ || true
          cp ../temp_data/*.xml web/public/feeds/ || true
          
          # 4. 変更をステージングして、差分がある場合のみコミット＆プッシュ
          git add web/public/data/articles.json web/public/data/targets.json web/public/feeds/*.xml
          if ! git diff --staged --quiet; then
            git commit -m "chore: update scraped data [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi

      - name: Build Next.js
        run: |
          cd web
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
