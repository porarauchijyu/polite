name: Scrape and Deploy RSS Dashboard

on:
  schedule:
    - cron: '0 * * * *' # 1時間おきに実行
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package.json

      - name: Install dependencies
        run: |
          cd web
          npm install
          npx playwright install chromium --with-deps

      - name: Run Scraper
        run: |
          cd web
          node --loader ts-node/esm scripts/scraper.ts

      - name: Commit Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/articles.json web/public/data/targets.json web/public/feeds/*.xml
          git diff --staged --quiet || (git commit -m "chore: update scraped data [skip ci]" && git push)

      - name: Build Next.js
        run: |
          cd web
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
